name: Distribution tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Fetch immutable release archives
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(python -c 'import json; print(json.load(open("release-manifest.json", encoding="utf-8"))["version"])')
          mkdir -p "dist/v${version}"
          gh release download "v${version}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "enhe-product-promo-maker-skill-${version}.zip" \
            --pattern "enhe-promotion-manager-extension-${version}.zip" \
            --dir "dist/v${version}" \
            --clobber

      - name: Verify distribution contract
        run: python scripts/verify_distribution.py

      - name: Run distribution tests
        run: python -m unittest discover -s tests -v
